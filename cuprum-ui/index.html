<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuprum CAM</title>
    <style>
      /* Paint dark immediately so there's no white flash before the CSS/JS load. */
      html, body { margin: 0; height: 100%; background: #0a0c10; }
      #root { height: 100%; }
      .boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0c10; }
      .boot-spinner {
        width: 30px; height: 30px; border-radius: 50%;
        border: 3px solid #2b313c; border-top-color: #e0863a;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Replaced by React on mount; shown during webview/bundle startup. -->
    <div id="root"><div class="boot"><div class="boot-spinner"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
